name: Generate Snake Animation

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/snake.yml'
      - 'README.md'
  schedule:
    - cron: '0 0 * * *' # Jalankan otomatis setiap 24 jam
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

permissions: 
  contents: write # untuk push ke branch output
  pages: write # Opsional, jika deploy ke github pages
  id-token: write # Opsional, untuk verifikasi token

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?pallette=github-dark
            dist/output.gif?color_snake=orange&color_dots=#161b22,#21262d,#3b5249,#238636,#0c662b&color_background=#aaaaaa

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
