name: Generate Snake Animation

on:
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/snake.yml'
      - 'README.md'
  schedule:
    - cron: '0 0 * * *' # Jalankan otomatis setiap 24 jam
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

permissions: 
  contents: write # untuk push ke branch output
  pages: write # Opsional, jika deploy ke github pages
  id-token: write # Opsional, untuk verifikasi token

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean old files
        run: |
          rm -rf dist/*
          
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light Mode
            dist/github-snake.svg?color_snake=orange&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

            # Dark Mode
            dist/github-snake-dark-v2.svg?color_snake=orange&color_dots=#161b22,#21262d,#3b5249,#238636,#0c662b

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
