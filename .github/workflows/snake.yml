name: Generate Snake Animation

on:
  schedule:
    - cron: '0 0 * * *' # Jalankan otomatis setiap 24 jam
  workflow_dispatch: # Bisa dijalankan manual dari tab Actions

permissions: 
  contents: write # untuk push ke branch output
  pages: write # Opsional, jika deploy ke github pages
  id-token: write # Opsional, untuk verifikasi token

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?pallette=github-dark
            dist/output.gif?color_snake=#FFA500&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
